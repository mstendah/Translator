<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation Editor</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Translation Editor</h1>
    <table>
        <tr>
            <th>Language</th>
            <th>Translation</th>
        </tr>
        <tr>
            <td>English (EN)</td>
            <td contenteditable="true">Enter English translation...</td>
        </tr>
        <tr>
            <td>Finnish (FI)</td>
            <td contenteditable="true">Enter Finnish translation...</td>
        </tr>
        <tr>
            <td>Swedish (SV)</td>
            <td contenteditable="true">Pre-translated from English</td>
        </tr>
    </table>
</body>
</html>
